name: CI - Build Telegram iOS (Unsigned)

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: '0'

      - name: Set correct Xcode version
        run: |
          if [ -f versions.json ]; then
            XCODE_VERSION=$(python3 -c '
          import json, sys
          try:
              with open("versions.json") as f:
                  data = json.load(f)
              print(data.get("xcode", "16.0"))
          except Exception:
              print("16.0")
            ')
            echo "🔧 Using Xcode $XCODE_VERSION"
            sudo xcode-select -s "/Applications/Xcode_$XCODE_VERSION.app/Contents/Developer"
          else
            echo "⚠️ versions.json not found, using default Xcode"
          fi
          xcodebuild -version

      - name: Create canonical source directory
        run: |
          set -x
          sudo mkdir -p /Users/Shared
          cp -R "$GITHUB_WORKSPACE" /Users/Shared/
          mv "/Users/Shared/$(basename "$GITHUB_WORKSPACE")" /Users/Shared/telegram-ios

      - name: Build Telegram IPA
        run: |
          set -x
          SOURCE_DIR="/Users/Shared/telegram-ios"
          BAZEL_USER_ROOT="/private/var/tmp/_bazel_containerhost"
          OUTPUT_PATH="$SOURCE_DIR/build/artifacts"

          cd "$SOURCE_DIR"

          if [ -f build_number_offset ]; then
            BUILD_NUMBER_OFFSET=$(cat build_number_offset)
          else
            BUILD_NUMBER_OFFSET=0
          fi

          APP_VERSION=$(python3 -c '
          import json, sys
          try:
              with open("versions.json") as f:
                  data = json.load(f)
              print(data.get("app", "unknown"))
          except Exception:
              print("unknown")
          ')

          COMMIT_COUNT=$(git rev-list --count HEAD)
          BUILD_NUMBER=$((COMMIT_COUNT + BUILD_NUMBER_OFFSET))

          echo "APP_VERSION=$APP_VERSION" >> $GITHUB_ENV
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV

          python3 build-system/Make/ImportCertificates.py --path build-system/fake-codesigning/certs

          python3 -u build-system/Make/Make.py \
            --bazelUserRoot="$BAZEL_USER_ROOT" \
            build \
            --configurationPath="build-system/appstore-configuration.json" \
            --codesigningInformationPath=build-system/fake-codesigning \
            --configuration=release_arm64 \
            --buildNumber="$BUILD_NUMBER"

          mkdir -p "$OUTPUT_PATH"
          find bazel-out -name "Telegram.ipa" -exec cp {} "$OUTPUT_PATH/Telegram.ipa" \;
          mkdir -p "$SOURCE_DIR/build/DSYMs"
          find bazel-out -name "*.dSYM" -exec cp -R {} "$SOURCE_DIR/build/DSYMs/" \;

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Telegram-iOS-Unsigned
          path: /Users/Shared/telegram-ios/build/artifacts/Telegram.ipa
